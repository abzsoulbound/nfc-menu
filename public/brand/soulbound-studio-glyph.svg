<svg
  width="96"
  height="96"
  viewBox="0 0 96 96"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0d898" />
      <stop offset="55%" stop-color="#e5aa14" />
      <stop offset="100%" stop-color="#9a7030" />
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="b" />
      <feMerge>
        <feMergeNode in="b" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect
    x="14"
    y="14"
    width="68"
    height="68"
    rx="4"
    fill="#0c1020"
    stroke="url(#gold)"
    stroke-width="2.2"
    transform="rotate(45 48 48)"
  />
  <rect
    x="22"
    y="22"
    width="52"
    height="52"
    rx="2"
    fill="none"
    stroke="url(#gold)"
    stroke-width="0.7"
    opacity="0.2"
    transform="rotate(45 48 48)"
  />
  <polyline
    points="26,58 48,30 70,58"
    fill="none"
    stroke="url(#gold)"
    stroke-width="4"
    stroke-linecap="square"
    stroke-linejoin="miter"
  />
  <polyline
    points="32,68 48,50 64,68"
    fill="none"
    stroke="url(#gold)"
    stroke-width="2"
    stroke-linecap="square"
    stroke-linejoin="miter"
    opacity="0.45"
  />
  <circle cx="48" cy="30" r="3.2" fill="#e5aa14" filter="url(#glow)" />
